name: Build release zip

# Builds the installable plugin zip and attaches it to a GitHub Release
# whenever a version tag (e.g. v1.0.0) is pushed.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Stage plugin files in a simple-ses/ folder
        run: |
          mkdir -p build/simple-ses
          cp simple-ses.php readme.txt uninstall.php LICENSE build/simple-ses/

      - name: Create simple-ses.zip
        run: |
          cd build
          zip -r ../simple-ses.zip simple-ses

      - name: Attach zip to the release
        uses: softprops/action-gh-release@v2
        with:
          files: simple-ses.zip
